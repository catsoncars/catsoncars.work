<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>contact // catsoncars.work</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Share Tech Mono', monospace;
    }

    .neon {
      color: #00ff9f;
      text-shadow: 0 0 5px #00ff9f, 0 0 12px #00ff9f;
    }

    .cursor::after {
      content: "_";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .glow-box {
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .glow-box:hover {
      box-shadow: 0 0 15px #00ff9f;
      transform: translateY(-2px);
    }

    .terminal-input,
    .terminal-textarea {
      background: transparent;
      border: 1px solid #22c55e;
      color: #00ff9f;
      outline: none;
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
    }

    .terminal-textarea {
      min-height: 180px;
    }

    .terminal-button {
      border: 1px solid #22c55e;
      color: #00ff9f;
      background: transparent;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      transition: box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .terminal-button:hover {
      box-shadow: 0 0 15px #00ff9f;
    }

    .terminal-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body class="bg-black text-green-400 min-h-screen flex flex-col">

  <div class="flex justify-between px-4 py-2 border-b border-green-500">
    <a href="index.html" class="neon text-sm hover:text-white">catsoncars.work</a>

    <div class="flex gap-6 text-sm">
      <a href="projects.html" class="neon hover:text-white">[ ./projects ]</a>
      <a href="blog.html" class="neon hover:text-white">[ ./blog ]</a>
      <a href="about.html" class="neon hover:text-white">[ ./contact ]</a>
    </div>
  </div>

  <main class="flex-grow p-6 max-w-5xl mx-auto w-full">
    <div class="mb-10">
      <h1 class="text-4xl neon">contact<span class="cursor"></span></h1>
    </div>

    <section class="border border-green-500 rounded-lg overflow-hidden glow-box">
      <div class="px-4 py-3 border-b border-green-500">
        <p class="neon">&gt; contact_table</p>
      </div>

      <div class="grid md:grid-cols-3">
  <div class="px-4 py-3 neon">github</div>
  <div class="px-4 py-3 text-green-300">github.com/catsoncars</div>
  <div class="px-4 py-3">
    <a href="https://github.com/catsoncars" target="_blank" class="neon hover:text-white">[ open ]</a>
  </div>

  <div class="px-4 py-3 neon">discord</div>
  <div class="px-4 py-3 text-green-300">klonop1n</div>
  <div class="px-4 py-3 text-green-600">[ manual add ]</div>

  <div class="px-4 py-3 neon">email</div>
  <div class="px-4 py-3 text-green-300">alex@catsoncars.work</div>
  <div class="px-4 py-3">
    <a href="mailto:alex@catsoncars.work" class="neon hover:text-white">[ compose ]</a>
  </div>
</div>
    </section>

    <section class="mt-10 border border-green-500 rounded-lg p-6 glow-box">
      <p class="neon mb-4">&gt; send_me_a_message</p>

      <form id="contactForm" class="space-y-4 transition-opacity duration-300">
        <input type="hidden" name="access_key" value="35a8096d-025e-4d6b-b0ed-81742fed7738">
        <input type="hidden" name="subject" value="New message from catsoncars.work">
        <input type="checkbox" name="botcheck" class="hidden">

        <input name="name" type="text" placeholder="name" class="terminal-input" required>
        <input name="email" type="email" placeholder="email" class="terminal-input" required>
        <textarea name="message" placeholder="message" class="terminal-textarea" required></textarea>

        <button id="sendButton" type="submit" class="terminal-button">[ send ]</button>
        <p id="result" class="text-green-600 text-sm"></p>
        <p class="text-green-600 text-sm">sends message directly from this site</p>
      </form>
    </section>
  </main>

  <footer class="mt-12 pb-6 text-center text-sm text-green-600 opacity-70">
    <p>&gt; © 2026 al3x // catsoncars.work</p>
  </footer>

  <script>
    const form = document.getElementById("contactForm");
    const result = document.getElementById("result");
    const sendButton = document.getElementById("sendButton");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      result.innerHTML = "&gt; sending...";
      sendButton.disabled = true;

      const formData = new FormData(form);
      const json = JSON.stringify(Object.fromEntries(formData));

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: json
        });

        const data = await response.json();

        if (response.ok) {
          result.innerHTML = "<span class='neon'>&gt; message_sent ✔</span>";
          form.reset();

          form.style.opacity = "0.6";
          setTimeout(() => {
            form.style.opacity = "1";
          }, 400);
        } else {
          result.innerHTML = "&gt; error: " + (data.message || "something went wrong");
        }
      } catch (error) {
        result.innerHTML = "&gt; network_error: try again";
      }

      sendButton.disabled = false;
    });
  </script>

</body>
</html>
